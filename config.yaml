# config.yaml
# Institution configuration. Every rule, weight, period length and break is
# data-driven so the same engine serves any college. Edit to match reality.

working_days: [Mon, Tue, Wed, Thu, Fri, Sat]
period_minutes: 55
periods_per_day: 8

breaks:
  short_break_after_period: 2
  lunch:
    staggered: true
    windows:
      year1: "12:30-13:15"
      year4: "13:15-14:00"

one_subject_per_day_theory: hard   # or "soft"

soft_weights:
  gap_minimization: 5
  even_spread: 4
  morning_for_core: 3
  faculty_balance: 4
  room_locality: 2
  faculty_preference: 2
  schedule_stability_on_resolve: 6

solver:
  engine: cp_sat
  time_limit_seconds: 120
  candidates_to_generate: 3
  random_seed: 1
